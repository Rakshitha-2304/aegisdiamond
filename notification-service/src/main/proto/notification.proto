syntax = "proto3";

package com.aegisdiamond.notification;

option java_multiple_files = true;
option java_package = "com.aegisdiamond.notification.grpc";
option java_outer_classname = "NotificationProto";

service NotificationService {
  rpc sendSecurityAlert (AlertRequest) returns (NotificationResponse);
  rpc sendShipmentUpdate (UpdateRequest) returns (NotificationResponse);
  rpc sendRiskAlert (AlertRequest) returns (NotificationResponse);
  rpc getNotifications (UserRequest) returns (NotificationListResponse);
}

message AlertRequest {
  int64 shipmentId = 1;
  string alertType = 2; // ROUTE_DEVIATION, RISK_SPIKE, CUSTOMS_DELAY
  string message = 3;
  string severity = 4; // LOW, MEDIUM, HIGH, CRITICAL
}

message UpdateRequest {
  int64 shipmentId = 1;
  string status = 2;
  string message = 3;
}

message NotificationResponse {
  int64 notificationId = 1;
  string status = 2; // SENT, FAILED
}

message UserRequest {
  int64 userId = 1;
}

message NotificationListResponse {
  repeated NotificationDetail notifications = 1;
}

message NotificationDetail {
  int64 id = 1;
  int64 shipmentId = 2;
  string type = 3;
  string message = 4;
  string timestamp = 5;
}
