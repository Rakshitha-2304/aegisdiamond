syntax = "proto3";

package com.aegisdiamond.diamond;

option java_multiple_files = true;
option java_package = "com.aegisdiamond.diamond.grpc";
option java_outer_classname = "DiamondProto";

service DiamondService {
  rpc registerDiamond (DiamondRequest) returns (DiamondResponse);
  rpc updateDiamondDetails (DiamondRequest) returns (DiamondResponse);
  rpc verifyCertification (CertificateRequest) returns (CertificateResponse);
  rpc linkCertificate (LinkCertificateRequest) returns (DiamondResponse);
  rpc getDiamondById (DiamondIdRequest) returns (DiamondResponse);
  rpc searchDiamonds (SearchRequest) returns (SearchResponse);
}

message DiamondRequest {
  int64 id = 1;
  string cut = 2;
  string clarity = 3;
  string color = 4;
  double carat = 5;
  int64 certificateId = 6;
  int64 ownerId = 7;
  }

  message DiamondResponse {
  int64 id = 1;
  string cut = 2;
  string clarity = 3;
  string color = 4;
  double carat = 5;
  int64 certificateId = 6;
  int64 ownerId = 7;
  string status = 8;
  }
  message CertificateRequest {
  int64 certificateId = 1;
  }

  message LinkCertificateRequest {
  int64 diamondId = 1;
  int64 certificateId = 2;
  }

message CertificateResponse {
  int64 certificateId = 1;
  bool isValid = 2;
  string issuedBy = 3;
  string issuedAt = 4;
  string message = 5;
}

message DiamondIdRequest {
  int64 id = 1;
}

message SearchRequest {
  string query = 1;
}

message SearchResponse {
  repeated DiamondResponse diamonds = 1;
}
