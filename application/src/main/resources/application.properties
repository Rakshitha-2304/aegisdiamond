spring.application.name=diamond-service
server.port=8085

# gRPC Server configuration
grpc.server.port=9095

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/diamond_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin_password

spring.ai.openai.api-key=${OPEN_API_KEY}
spring.ai.openai.chat.options.model=gpt-4.1-mini