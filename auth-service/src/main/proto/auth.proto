syntax = "proto3";

package com.aegisdiamond.auth;

import "validate/validate.proto";

option java_multiple_files = true;
option java_package = "com.aegisdiamond.auth.grpc";
option java_outer_classname = "AuthProto";

service AuthService {
  rpc register (RegisterRequest) returns (AuthResponse);

  rpc login (LoginRequest) returns (AuthResponse);
  rpc validateToken (ValidateRequest) returns (ValidateResponse);
}

message RegisterRequest {
  string username = 1 [(validate.rules).string = {min_len: 3, max_len: 50}];
  string password = 2 [(validate.rules).string = {min_len: 8, max_len: 100}];
  string email = 3 [(validate.rules).string = {email: true}];
  string role = 4 [(validate.rules).string = {in: ["vault_manager", "customs_officer", "insurance_agent", "supplier", "shipper"]}];
}

message LoginRequest {
  string username = 1 [(validate.rules).string = {min_len: 3, max_len: 50}];
  string password = 2 [(validate.rules).string = {min_len: 8, max_len: 100}];
}

message AuthResponse {
  string token = 1;
  string username = 2;
  string role = 3; // "admin", "vault_manager", etc.
  string message = 4;
}

message ValidateRequest {
  string token = 1 [(validate.rules).string = {min_len: 1}];
}

message ValidateResponse {
  bool isValid = 1;
  string username = 2;
  string role = 3; // "admin", "vault_manager", etc.
}
