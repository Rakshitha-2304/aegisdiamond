syntax = "proto3";

package com.aegisdiamond.payment;

import "validate/validate.proto";

option java_multiple_files = true;
option java_package = "com.aegisdiamond.payment.grpc";
option java_outer_classname = "PaymentProto";

service PaymentService {
  rpc initiatePayment (PaymentRequest) returns (PaymentResponse);
  rpc confirmPayment (ConfirmRequest) returns (PaymentResponse);
  rpc processEscrow (PaymentRequest) returns (PaymentResponse);
  rpc releaseFunds (ConfirmRequest) returns (PaymentResponse);
  rpc getTransactionDetails (TransactionIdRequest) returns (PaymentResponse);
}

message PaymentRequest {
  int64 shipmentId = 1 [(validate.rules).int64 = {gt: 0}];
  double amount = 2 [(validate.rules).double = {gt: 0}];
  string currency = 3 [(validate.rules).string = {len: 3}];
  int64 payerId = 4 [(validate.rules).int64 = {gt: 0}];
  int64 payeeId = 5 [(validate.rules).int64 = {gt: 0}];
  bool useEscrow = 6;
}

message PaymentResponse {
  int64 transactionId = 1;
  string status = 2; // INITIATED, PENDING_ESCROW, CONFIRMED, RELEASED, FAILED
  double amount = 3;
  string message = 4;
}

message ConfirmRequest {
  int64 transactionId = 1 [(validate.rules).int64 = {gt: 0}];
}

message TransactionIdRequest {
  int64 id = 1 [(validate.rules).int64 = {gt: 0}];
}
